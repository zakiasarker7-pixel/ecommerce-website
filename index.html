<!DOCTYPE html>

<body>

<header>
    <h1>My E-Commerce Store</h1>

    <nav>
        <a href="index.html">Home</a>

<section class="hero">
    <h2>Welcome to My Online Shop</h2>
    <p>Best Products at Best Prices</p>
    <a href="shop.html" class="btn">Shop Now</a>
</section>
<div class="slider">
    <img id="banner"
    src="https://picsum.photos/1200/400?random=1"
    alt="Banner">
</div>

<script>
const images = [
"https://picsum.photos/1200/400?random=1",
"https://picsum.photos/1200/400?random=2",
"https://picsum.photos/1200/400?random=3",
"https://picsum.photos/1200/400?random=4"
];

let i = 0;

setInterval(() => {
    i = (i + 1) % images.length;
    document.getElementById("banner").src = images[i];
}, 3000);
</script>
    
<section class="products">

<div class="product">
<img src="https://via.placeholder.com/200" alt="Product">

</div>
