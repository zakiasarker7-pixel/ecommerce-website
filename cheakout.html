<section class="checkout">

<h3>Order Summary</h3>

<p>Wireless Headphones - $99</p>
<p>Smart Watch - $120</p>

<textarea placeholder="Delivery Address"></textarea>

<select>
<option>Cash on Delivery</option>
<option>bKash</option>
<option>Nagad</option>

</select>


<button type="submit">
Place Order
</button>

</form>
